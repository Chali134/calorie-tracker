<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CalTrack">
    <meta name="theme-color" content="#080808">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>{% block title %}CalTrack{% endblock %}</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Urbanist', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'], display: ['Urbanist', 'sans-serif'], mono: ['Space Mono', 'monospace'] },
                    colors: {
                        brand: { DEFAULT: '#FF6B3D', light: '#FF8A66', dark: '#D85A30' },
                        'brand-bg': '#2A1812',
                        green: { DEFAULT: '#2ECC71', bg: '#122A1A', dark: '#1EA85E', mid: '#2ECC71' },
                        gold: { DEFAULT: '#F0B429', bg: '#2A2210', dark: '#D49525', mid: '#F0B429' },
                        purple: { DEFAULT: '#A78BFA', bg: '#1E1A2E', dark: '#8B6FE8', mid: '#A78BFA' },
                        surface: { DEFAULT: '#141414', card: '#1A1A1A', hover: '#222222', border: '#2A2A2A', 'border-light': '#333333' },
                        gray: { 50: '#141414', 100: '#1A1A1A', 200: '#2A2A2A', 300: '#3A3A3A', 400: '#6B6B6B', 500: '#888888', 600: '#A0A0A0', 700: '#CCCCCC', 800: '#E5E5E5', 900: '#F5F5F5' },
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-[#080808] text-gray-800 font-sans antialiased selection:bg-[#FF6B3D]/20 selection:text-white">
    {% block content %}{% endblock %}
</body>
</html>
