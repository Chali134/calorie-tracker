{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-5">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <img src="/static/logo.svg" alt="CalTrack" class="w-16 h-16 mx-auto mb-4 border-2 border-[#D85A30]">
            <h1 class="text-2xl font-bold text-white">Welcome back</h1>
            <p class="text-sm text-gray-400 mt-1">Sign in to track your meals</p>
        </div>

        <form method="post" action="/login" class="space-y-4">
            {% if error %}
            <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm px-4 py-3">{{ error }}</div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">Username</label>
                <input type="text" name="username" required autocomplete="username"
                    class="form-input w-full px-4 py-3">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">Password</label>
                <input type="password" name="password" required autocomplete="current-password"
                    class="form-input w-full px-4 py-3">
            </div>

            <button type="submit"
                class="w-full py-3.5 bg-[#FF6B3D] hover:bg-[#D85A30] text-white  font-medium active:scale-[0.98] transition-all duration-200">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Don't have an account?
            <a href="/signup" class="text-[#FF6B3D] font-medium hover:underline underline-offset-2">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
