{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-5">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#2ECC71]/20 to-[#1D9E75]/10 flex items-center justify-center mx-auto mb-4">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="#2ECC71" stroke="none"><path d="M12 2C12 2 6 10 6 15c0 3.3 2.7 6 6 6s6-2.7 6-6c0-5-6-13-6-13z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Create Account</h1>
            <p class="text-sm text-gray-500 mt-1">Start tracking your calories</p>
        </div>

        <form method="post" action="/signup" class="space-y-4">
            {% if error %}
            <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl px-4 py-3">{{ error }}</div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1.5">Username</label>
                <input type="text" name="username" required minlength="3" autocomplete="username"
                    class="form-input w-full px-4 py-3">
                <p class="text-xs text-gray-500 mt-1">At least 3 characters</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1.5">Password</label>
                <input type="password" name="password" required minlength="6" autocomplete="new-password"
                    class="form-input w-full px-4 py-3">
                <p class="text-xs text-gray-500 mt-1">At least 6 characters</p>
            </div>

            <button type="submit"
                class="w-full py-3.5 bg-[#2ECC71] hover:bg-[#27AE60] text-white rounded-xl font-medium active:scale-[0.98] transition-all duration-200">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account?
            <a href="/login" class="text-[#2ECC71] font-medium hover:underline underline-offset-2">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
