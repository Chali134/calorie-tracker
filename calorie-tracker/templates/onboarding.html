{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-5 py-8">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <img src="/static/logo.svg" alt="CalTrack" class="w-16 h-16 mx-auto mb-4 border-2 border-[#D85A30]">
            <h1 class="text-2xl font-bold text-white">Set Up Your Profile</h1>
            <p class="text-sm text-gray-500 mt-1">We'll calculate your daily targets</p>
        </div>

        <form method="post" action="/onboarding" class="space-y-5">
            <!-- Age -->
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1.5">Age</label>
                <input type="number" name="age" min="10" max="120" required
                    class="form-input w-full px-4 py-3">
            </div>

            <!-- Gender -->
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1.5">Gender</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="opt-btn flex items-center justify-center px-4 py-3 dark-card  cursor-pointer text-sm font-medium transition-colors active">
                        <input type="radio" name="gender" value="male" checked class="hidden"
                            onchange="this.closest('.opt-btn').parentElement.querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Male
                    </label>
                    <label class="opt-btn flex items-center justify-center px-4 py-3 dark-card  cursor-pointer text-sm font-medium transition-colors">
                        <input type="radio" name="gender" value="female" class="hidden"
                            onchange="this.closest('.opt-btn').parentElement.querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Female
                    </label>
                </div>
            </div>

            <!-- Weight -->
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1.5">Weight (kg)</label>
                <input type="number" name="weight" min="20" max="500" step="0.1" required
                    class="form-input w-full px-4 py-3">
            </div>

            <!-- Height with cm/ft toggle -->
            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="block text-sm font-medium text-gray-500">Height</label>
                    <div class="flex bg-[#1C1C1C]  p-0.5 text-xs">
                        <button type="button" id="height-cm-btn" class="px-2.5 py-1  font-medium bg-[#2A2A2A] text-white transition-all" onclick="toggleHeightUnit('cm')">cm</button>
                        <button type="button" id="height-ft-btn" class="px-2.5 py-1  font-medium text-gray-500 transition-all" onclick="toggleHeightUnit('ft')">ft/in</button>
                    </div>
                </div>
                <!-- cm input (default) -->
                <input type="number" id="height-cm" name="height" min="50" max="300" required
                    class="form-input w-full px-4 py-3"
                    placeholder="e.g. 175">
                <!-- ft/in inputs (hidden by default) -->
                <div id="height-ft-group" class="hidden grid grid-cols-2 gap-2">
                    <div>
                        <input type="number" id="height-ft" min="1" max="8" placeholder="ft"
                            class="form-input w-full px-4 py-3"
                            oninput="syncHeightCm()">
                    </div>
                    <div>
                        <input type="number" id="height-in" min="0" max="11" placeholder="in"
                            class="form-input w-full px-4 py-3"
                            oninput="syncHeightCm()">
                    </div>
                </div>
            </div>

            <!-- Activity Level -->
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1.5">Activity Level</label>
                <div class="grid grid-cols-3 gap-2">
                    <label class="opt-btn flex items-center justify-center px-3 py-3 dark-card cursor-pointer text-sm font-medium transition-colors" onclick="this.querySelector('input').click()">
                        <input type="radio" name="activity_level" value="sedentary" class="hidden"
                            onchange="this.closest('.grid').querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Sedentary
                    </label>
                    <label class="opt-btn flex items-center justify-center px-3 py-3 dark-card cursor-pointer text-sm font-medium transition-colors active" onclick="this.querySelector('input').click()">
                        <input type="radio" name="activity_level" value="light" checked class="hidden"
                            onchange="this.closest('.grid').querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Light
                    </label>
                    <label class="opt-btn flex items-center justify-center px-3 py-3 dark-card cursor-pointer text-sm font-medium transition-colors" onclick="this.querySelector('input').click()">
                        <input type="radio" name="activity_level" value="moderate" class="hidden"
                            onchange="this.closest('.grid').querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Moderate
                    </label>
                    <label class="opt-btn flex items-center justify-center px-3 py-3 dark-card cursor-pointer text-sm font-medium transition-colors" onclick="this.querySelector('input').click()">
                        <input type="radio" name="activity_level" value="active" class="hidden"
                            onchange="this.closest('.grid').querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Active
                    </label>
                    <label class="opt-btn flex items-center justify-center px-3 py-3 dark-card cursor-pointer text-sm font-medium transition-colors col-span-2" onclick="this.querySelector('input').click()">
                        <input type="radio" name="activity_level" value="very_active" class="hidden"
                            onchange="this.closest('.grid').querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Very Active
                    </label>
                </div>
            </div>

            <!-- Goal -->
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-1.5">Goal</label>
                <div class="grid grid-cols-3 gap-2">
                    <label class="opt-btn flex items-center justify-center px-3 py-3 dark-card  cursor-pointer text-sm font-medium transition-colors">
                        <input type="radio" name="goal_type" value="lose" class="hidden"
                            onchange="this.closest('.opt-btn').parentElement.querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Lose
                    </label>
                    <label class="opt-btn flex items-center justify-center px-3 py-3 dark-card  cursor-pointer text-sm font-medium transition-colors active">
                        <input type="radio" name="goal_type" value="maintain" checked class="hidden"
                            onchange="this.closest('.opt-btn').parentElement.querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Maintain
                    </label>
                    <label class="opt-btn flex items-center justify-center px-3 py-3 dark-card  cursor-pointer text-sm font-medium transition-colors">
                        <input type="radio" name="goal_type" value="gain" class="hidden"
                            onchange="this.closest('.opt-btn').parentElement.querySelectorAll('.opt-btn').forEach(l=>l.classList.remove('active')); this.closest('.opt-btn').classList.add('active')">
                        Gain
                    </label>
                </div>
            </div>

            <button type="submit"
                class="w-full py-3.5 bg-[#A78BFA] text-white font-bold text-sm active:opacity-80 transition-opacity mt-3">
                Calculate My Targets
            </button>
        </form>
    </div>
</div>

<script>
let heightUnit = 'cm';

function toggleHeightUnit(unit) {
    heightUnit = unit;
    document.getElementById('height-cm-btn').className = 'px-2.5 py-1  font-medium ' + (unit === 'cm' ? 'bg-[#2A2A2A] text-white' : 'text-gray-500');
    document.getElementById('height-ft-btn').className = 'px-2.5 py-1  font-medium ' + (unit === 'ft' ? 'bg-[#2A2A2A] text-white' : 'text-gray-500');

    if (unit === 'cm') {
        document.getElementById('height-cm').classList.remove('hidden');
        document.getElementById('height-cm').required = true;
        document.getElementById('height-ft-group').classList.add('hidden');
        document.getElementById('height-ft').required = false;
        document.getElementById('height-in').required = false;
    } else {
        document.getElementById('height-cm').classList.add('hidden');
        document.getElementById('height-cm').required = false;
        document.getElementById('height-ft-group').classList.remove('hidden');
        document.getElementById('height-ft').required = true;
        document.getElementById('height-in').required = true;
    }
}

function syncHeightCm() {
    const ft = parseFloat(document.getElementById('height-ft').value) || 0;
    const inc = parseFloat(document.getElementById('height-in').value) || 0;
    const cm = Math.round((ft * 30.48) + (inc * 2.54));
    document.getElementById('height-cm').value = cm;
}

// Ensure height_cm is set before form submit when in ft mode
document.querySelector('form').addEventListener('submit', function(e) {
    if (heightUnit === 'ft') {
        syncHeightCm();
        document.getElementById('height-cm').required = true;
    }
});
</script>
{% endblock %}
