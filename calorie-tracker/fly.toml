app = "calorie-tracker"
primary_region = "iad"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 443
    handlers = ["tls"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.concurrency]]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[mounts]]
  source = "data"
  destination = "/data"

[env]
  DB_PATH = "/data/calories.db"
